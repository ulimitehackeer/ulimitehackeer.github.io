<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My GG Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    header {
      padding: 40px;
      font-size: 32px;
      font-weight: bold;
      background: #111827;
    }
    .container {
      padding: 40px;
    }
    .card {
      background: #1f2937;
      padding: 20px;
      margin: 20px auto;
      border-radius: 15px;
      max-width: 400px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  MY GAMING SITE
</header>

<div class="container">
  <div class="card">
    <h2>About Me</h2>
    <p>I am a gamer. Welcome to my site!</p>
  </div>

  <div class="card">
    <h2>My Links</h2>
    <button onclick="window.location.href='https://discord.com'">Join Discord</button>
  </div>
</div>

</body>
</html>
